# SPDX-License-Identifier: MIT
name: Wheels
on:
  push:
    tags: ["v*"]          # a version tag builds and publishes to PyPI
  workflow_dispatch:      # manual runs: build only, or dry-run to TestPyPI
    inputs:
      target:
        description: "Publish target after building"
        type: choice
        default: none
        options: [none, testpypi, pypi]

jobs:
  build_wheels:
    name: Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Native builds only — each runner builds its own architecture:
        # Linux x86_64, macOS x86_64 (macos-13) + arm64 (macos-14), Windows AMD64.
        os: [ubuntu-latest, macos-13, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  publish_testpypi:
    name: Publish to TestPyPI (dry run)
    needs: [build_wheels, build_sdist]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write     # OIDC token for Trusted Publishing (no stored secret)
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish_pypi:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write     # OIDC token for Trusted Publishing (no stored secret)
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
